<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 질문 뽑기</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      margin: 0;
      padding: 0;
      background: #fffafc;
      color: #222;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 40px;
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin: 18px 0 10px;
    }

    .sub {
      text-align: center;
      color: #666;
      font-size: 15px;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 22px;
      line-height: 1.5;
      word-break: keep-all;
    }

    .category {
      text-align: center;
      margin-bottom: 10px;
      font-size: 14px;
      color: #888;
    }

    .buttons {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #ff6fae;
      color: white;
    }

    .secondary {
      background: #ffd8e8;
      color: #b03060;
    }

    .ghost {
      background: #fff;
      color: #444;
      border: 1px solid #e5e5e5;
    }

    .section {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      padding: 16px;
      margin-top: 14px;
    }

    .section h2 {
      font-size: 18px;
      margin: 0 0 14px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 600;
    }

    select, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      margin-bottom: 12px;
      font-family: inherit;
      background: white;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .small {
      font-size: 13px;
      color: #888;
      margin-top: -4px;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .stats {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .item {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 12px;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: flex-start;
      background: #fffdfd;
    }

    .item-text {
      font-size: 14px;
      line-height: 1.5;
      flex: 1;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .delete-btn {
      background: #f4f4f4;
      color: #555;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      min-width: 56px;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .pill {
      border: 1px solid #eee;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      color: #666;
      background: #fff;
    }

    .notice {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }

    .loading {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>우리 질문 뽑기</h1>
    <p class="sub">둘이 같이 질문 추가하고 랜덤으로 뽑아보는 버전 💗</p>

    <div class="category" id="category">카테고리: 전체</div>
    <div class="card" id="questionBox">버튼을 눌러 질문을 뽑아봐 💬</div>

    <div class="buttons">
      <button class="primary" onclick="drawQuestion('all')">전체 질문 뽑기</button>
      <button class="secondary" onclick="drawQuestion('love')">연애 질문</button>
      <button class="secondary" onclick="drawQuestion('balance')">밸런스 게임</button>
      <button class="secondary" onclick="drawQuestion('fun')">장난 질문</button>
      <button class="ghost" onclick="toggleAddSection()">질문 추가하기</button>
      <button class="ghost" onclick="toggleManageSection()">질문 목록 보기</button>
    </div>

    <div class="section" id="addSection" style="display:none;">
      <h2>질문 추가하기</h2>

      <label for="categorySelect">카테고리</label>
      <select id="categorySelect">
        <option value="love">연애 질문</option>
        <option value="balance">밸런스 게임</option>
        <option value="fun">장난 질문</option>
      </select>

      <label for="questionInput">질문 내용</label>
      <textarea id="questionInput" placeholder="예) 다음 여행 가면 바다 vs 산?"></textarea>
      <div class="small">추가하면 같은 링크에서 같이 보이게 돼.</div>

      <button class="primary" onclick="addQuestion()">추가하기</button>
    </div>

    <div class="section" id="manageSection" style="display:none;">
      <h2>질문 목록</h2>

      <div class="pill-row">
        <button class="pill" onclick="renderQuestions('all')">전체</button>
        <button class="pill" onclick="renderQuestions('love')">연애 질문</button>
        <button class="pill" onclick="renderQuestions('balance')">밸런스 게임</button>
        <button class="pill" onclick="renderQuestions('fun')">장난 질문</button>
      </div>

      <div class="stats" id="statsText">불러오는 중...</div>
      <div class="list" id="questionList"></div>

      <div class="notice">
        지금은 Firestore 테스트 모드 기준으로 쓰는 버전이야.  
        나중에는 보안 규칙을 따로 손보는 게 좋아.
      </div>
    </div>

    <div class="loading" id="loadingText">Firebase 연결 중...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      doc,
      onSnapshot,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD8jZ9kTlGd2OzFswmAzLt8zpec9kMHHV4",
      authDomain: "couple-question-app.firebaseapp.com",
      projectId: "couple-question-app",
      storageBucket: "couple-question-app.firebasestorage.app",
      messagingSenderId: "455058967733",
      appId: "1:455058967733:web:c3d138b1a695c1c4af02fc"
    };

    const DEFAULT_QUESTIONS = [
      { category: "love", text: "내가 했을 때 제일 좋았던 말이나 행동은?" },
      { category: "love", text: "처음보다 더 좋아진 점 하나 말해보기" },
      { category: "love", text: "요즘 나한테 바라는 점 하나는?" },

      { category: "balance", text: "집데이트 vs 밖데이트" },
      { category: "balance", text: "바다 여행 vs 산 여행" },
      { category: "balance", text: "전화 오래 하기 vs 카톡 자주 하기" },

      { category: "fun", text: "내 별명 하나 새로 지어준다면?" },
      { category: "fun", text: "나를 동물에 비유하면 뭐야?" },
      { category: "fun", text: "같이 먹고 싶은 야식 하나만 고르면?" }
    ];

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const questionsRef = collection(db, "questions");

    let allQuestions = [];
    let currentManageFilter = "all";

    function getCategoryLabel(type) {
      if (type === "love") return "연애 질문";
      if (type === "balance") return "밸런스 게임";
      if (type === "fun") return "장난 질문";
      return "전체";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function updateLoadingText(message = "") {
      const el = document.getElementById("loadingText");
      el.textContent = message;
      el.style.display = message ? "block" : "none";
    }

    async function addDefaultQuestionsIfEmpty(snapshot) {
      if (!snapshot.empty) return;

      for (const item of DEFAULT_QUESTIONS) {
        await addDoc(questionsRef, {
          category: item.category,
          text: item.text,
          createdAt: serverTimestamp()
        });
      }
    }

    function getFilteredQuestions(filter) {
      if (filter === "all") return allQuestions;
      return allQuestions.filter(item => item.category === filter);
    }

    window.drawQuestion = function(type) {
      let list = [];

      if (type === "all") {
        list = [...allQuestions];
      } else {
        list = allQuestions.filter(item => item.category === type);
      }

      if (!list.length) {
        document.getElementById("questionBox").textContent = "아직 질문이 없어. 먼저 하나 추가해봐 💡";
        document.getElementById("category").textContent = `카테고리: ${getCategoryLabel(type)}`;
        return;
      }

      const randomIndex = Math.floor(Math.random() * list.length);
      document.getElementById("questionBox").textContent = list[randomIndex].text;
      document.getElementById("category").textContent = `카테고리: ${getCategoryLabel(type)}`;
    };

    window.toggleAddSection = function() {
      const addSection = document.getElementById("addSection");
      const manageSection = document.getElementById("manageSection");

      addSection.style.display = addSection.style.display === "none" ? "block" : "none";
      manageSection.style.display = "none";
    };

    window.toggleManageSection = function() {
      const addSection = document.getElementById("addSection");
      const manageSection = document.getElementById("manageSection");

      if (manageSection.style.display === "none") {
        manageSection.style.display = "block";
        renderQuestions(currentManageFilter);
      } else {
        manageSection.style.display = "none";
      }

      addSection.style.display = "none";
    };

    window.addQuestion = async function() {
      const category = document.getElementById("categorySelect").value;
      const input = document.getElementById("questionInput");
      const text = input.value.trim();

      if (!text) {
        alert("질문 내용을 입력해줘!");
        return;
      }

      try {
        await addDoc(questionsRef, {
          category,
          text,
          createdAt: serverTimestamp()
        });

        input.value = "";
        alert("질문이 추가됐어 💗");
      } catch (error) {
        console.error(error);
        alert("질문 추가 중 오류가 났어.");
      }
    };

    window.renderQuestions = function(filter = "all") {
      currentManageFilter = filter;

      const listEl = document.getElementById("questionList");
      const statsEl = document.getElementById("statsText");
      const items = getFilteredQuestions(filter);

      statsEl.textContent = `${getCategoryLabel(filter)} 질문 ${items.length}개`;
      listEl.innerHTML = "";

      if (!items.length) {
        listEl.innerHTML = `<div class="item"><div class="item-text">아직 질문이 없어.</div></div>`;
        return;
      }

      items.forEach((item) => {
        const row = document.createElement("div");
        row.className = "item";

        const text = document.createElement("div");
        text.className = "item-text";
        text.innerHTML = `
          <strong>[${getCategoryLabel(item.category)}]</strong><br>
          ${escapeHtml(item.text)}
        `;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.textContent = "삭제";
        del.onclick = () => deleteQuestion(item.id);

        row.appendChild(text);
        row.appendChild(del);
        listEl.appendChild(row);
      });
    };

    async function deleteQuestion(id) {
      const ok = confirm("이 질문 삭제할까?");
      if (!ok) return;

      try {
        await deleteDoc(doc(db, "questions", id));
      } catch (error) {
        console.error(error);
        alert("삭제 중 오류가 났어.");
      }
    }

    function startRealtimeListener() {
      updateLoadingText("Firebase 연결 중...");

      const q = query(questionsRef, orderBy("createdAt", "desc"));

      onSnapshot(q, async (snapshot) => {
        try {
          await addDefaultQuestionsIfEmpty(snapshot);
        } catch (error) {
          console.error(error);
        }

        allQuestions = snapshot.docs.map((docItem) => ({
          id: docItem.id,
          ...docItem.data()
        }));

        renderQuestions(currentManageFilter);
        updateLoadingText("");
      }, (error) => {
        console.error(error);
        updateLoadingText("데이터를 불러오지 못했어. Firestore 설정을 확인해봐.");
      });
    }

    startRealtimeListener();
  </script>
</body>
</html>
