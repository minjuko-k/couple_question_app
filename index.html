<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 질문함 🖤</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>우리 질문함 🖤</h1>
      <button id="changeRoleBtn" class="ghost-btn small">역할 변경</button>
    </header>

    <section class="role-strip">
      <div>
        <span class="label">현재 사용자</span>
        <strong id="currentRole">선택 안 됨</strong>
      </div>
    </section>

    <nav class="menu-grid">
      <button class="menu-btn active" data-view="add">질문 추가</button>
      <button class="menu-btn" data-view="minju-pending">민주 답변 전</button>
      <button class="menu-btn" data-view="seokmin-pending">석민 답변 전</button>
      <button class="menu-btn" data-view="done">답변 완료</button>
    </nav>

    <!-- 질문 추가 -->
    <section id="view-add" class="view active">
      <div class="card">
        <h2>익명 질문 추가</h2>
        <textarea
          id="questionInput"
          rows="5"
          placeholder="궁금한 질문을 익명으로 남겨줘"
        ></textarea>
        <button id="addQuestionBtn" class="primary-btn full">질문 등록</button>
      </div>
    </section>

    <!-- 민주 답변 전 -->
    <section id="view-minju-pending" class="view">
      <div class="card">
        <h2>민주 답변 전</h2>
        <div id="minjuPendingList" class="list-box"></div>
      </div>
    </section>

    <!-- 석민 답변 전 -->
    <section id="view-seokmin-pending" class="view">
      <div class="card">
        <h2>석민 답변 전</h2>
        <div id="seokminPendingList" class="list-box"></div>
      </div>
    </section>

    <!-- 답변 완료 -->
    <section id="view-done" class="view">
      <div class="card">
        <h2>답변 완료</h2>
        <div id="doneList" class="list-box"></div>
      </div>
    </section>
  </div>

  <!-- 역할 선택 모달 -->
  <div id="roleModal" class="modal-overlay show">
    <div class="modal-card">
      <h2>누가 들어왔어?</h2>
      <p class="sub-text">역할을 선택하고 PIN을 입력해줘</p>

      <div class="role-buttons">
        <button class="role-btn" data-role="민주">민주</button>
        <button class="role-btn" data-role="석민">석민</button>
      </div>

      <input
        type="password"
        id="pinInput"
        class="pin-input"
        placeholder="PIN 입력"
      />

      <button id="confirmRoleBtn" class="primary-btn full">확인</button>
      <p id="roleError" class="error-text"></p>
    </div>
  </div>

  <!-- 질문 상세 / 답변 모달 -->
  <div id="detailModal" class="modal-overlay">
    <div class="modal-card detail-card">
      <button id="closeDetailBtn" class="close-btn">×</button>

      <h2>질문</h2>
      <p id="detailQuestion" class="question-text"></p>

      <div class="answer-block">
        <h3>민주 답변</h3>
        <div id="minjuAnswerView" class="answer-view">아직 답변 전</div>
      </div>

      <div class="answer-block">
        <h3>석민 답변</h3>
        <div id="seokminAnswerView" class="answer-view">아직 답변 전</div>
      </div>

      <div id="answerEditor" class="answer-editor hidden">
        <h3 id="editorTitle">답변 작성</h3>
        <textarea
          id="answerInput"
          rows="5"
          placeholder="답변을 입력해줘"
        ></textarea>
        <button id="saveAnswerBtn" class="primary-btn full">답변 저장</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp,
      query,
      orderBy,
      onSnapshot,
      doc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyD8jZ9kTlGd2OzFswmAzLt8zpec9kMHHV4",
  authDomain: "couple-question-app.firebaseapp.com",
  projectId: "couple-question-app",
  storageBucket: "couple-question-app.firebasestorage.app",
  messagingSenderId: "455058967733",
  appId: "1:455058967733:web:c3d138b1a695c1c4af02fc"
};


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseRefs = {
      auth,
      db,
      signInAnonymously,
      collection,
      addDoc,
      serverTimestamp,
      query,
      orderBy,
      onSnapshot,
      doc,
      updateDoc
    };
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
